<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Emotica</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="landing.html" class="navbar-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="8" width="40" height="28" rx="14" fill="#7F1DFF"/>
                    <ellipse cx="24" cy="22" rx="16" ry="12" fill="#fff"/>
                    <ellipse cx="18" cy="22" rx="2.5" ry="2.5" fill="#7F1DFF"/>
                    <ellipse cx="30" cy="22" rx="2.5" ry="2.5" fill="#7F1DFF"/>
                    <path d="M18 27c2.5 2 7.5 2 10 0" stroke="#7F1DFF" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Emotica
            </a>
           <div class="navbar-menu" id="navbarMenu">
                <a href="landing.html" class="navbar-link">Home</a>
                <a href="dashboard.html" class="navbar-link">Dashboard</a>
                <a href="history.html" class="navbar-link">Riwayat</a>
                <a href="about.html" class="navbar-link">Tentang</a>
            </div>
            <div class="navbar-actions" id="navbarActions">
                <button class="navbar-btn" id="navbarLoginBtn active">Login / Register</button>
            </div>
            <button class="navbar-hamburger" id="navbarHamburger"><i class="fas fa-bars"></i></button>
        </div>
    </nav>
    <div class="main-content">
        <div class="logo" style="display:none"></div>
        <svg class="login-svg" viewBox="0 0 180 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="90" cy="110" rx="80" ry="10" fill="#7f1dff22"/>
            <rect x="40" y="30" width="100" height="50" rx="16" fill="#fff" fill-opacity="0.08" stroke="#a259ff" stroke-width="3"/>
            <rect x="70" y="50" width="40" height="20" rx="8" fill="#a259ff"/>
            <rect x="80" y="60" width="20" height="8" rx="3" fill="#fff" fill-opacity="0.7"/>
            <circle cx="90" cy="55" r="6" fill="#fff" fill-opacity="0.7"/>
            <rect x="90" y="40" width="10" height="10" rx="3" fill="#a259ff"/>
        </svg>
       <div class="neon-card w-full max-w-md p-8 flex flex-col items-center">
    <h2 class="text-3xl font-bold mb-6 gradient-text">Login</h2>
    <form id="loginForm" class="w-full">
        <div class="mb-4">
            <label for="email" class="block text-gray-300 mb-2">Email</label>
            <input type="email" id="email" required 
                class="neon-input w-full" 
                placeholder="Masukkan email Anda">
        </div>
        <div class="mb-6">
            <label for="password" class="block text-gray-300 mb-2">Password</label>
            <input type="password" id="password" required 
                class="neon-input w-full" 
                placeholder="Masukkan password Anda">
        </div>
        <button type="submit" class="neon-btn w-full mb-4">Login</button>
        <p class="text-center text-gray-400">
            Belum punya akun? 
            <a href="register.html" id="registerLink" class="text-purple-400 hover:underline">Register</a>
        </p>
    </form>
</div>
    </div>
<script>
    // Navbar hamburger logic
    const navbarHamburger = document.getElementById('navbarHamburger');
    const navbarMenu = document.getElementById('navbarMenu');
    const navbarLoginBtn = document.getElementById('navbarLoginBtn');
    const loginForm = document.getElementById('loginForm');
    const registerLink = document.getElementById('registerLink');

    // Fix class active yang salah di button
    navbarLoginBtn.classList.remove('active');

    // Hamburger menu toggle
    navbarHamburger.addEventListener('click', () => {
        navbarMenu.classList.toggle('open');
    });
    // Login form handler
loginForm.addEventListener('submit', (event) => {
    event.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        // Ambil data users dari localStorage
        const users = JSON.parse(localStorage.getItem('users')) || [];
        
        // Cek apakah email dan password cocok
        const user = users.find(u => u.email === email && u.password === password);

        if (user) {
            // Login sukses
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify({
                name: user.name,
                email: user.email
            }));

            // Notifikasi sukses
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            notification.innerHTML = `
                <div class="flex items-center space-x-2">
                    <i class="fas fa-check-circle"></i>
                    <span>Login berhasil! Selamat datang kembali, ${user.name}</span>
                </div>
            `;
            document.body.appendChild(notification);

            // Redirect setelah notifikasi
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        } else {
            // Login gagal
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            notification.innerHTML = `
                <div class="flex items-center space-x-2">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Login gagal: Email atau password salah!</span>
                </div>
            `;
            document.body.appendChild(notification);

            // Hapus notifikasi setelah 3 detik
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
    } catch (error) {
        console.error('Error during login:', error);
        // Notifikasi error
        const notification = document.createElement('div');
        notification.className = 'fixed top-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
        notification.innerHTML = `
            <div class="flex items-center space-x-2">
                <i class="fas fa-exclamation-circle"></i>
                <span>Terjadi kesalahan saat login. Silakan coba lagi.</span>
            </div>
        `;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
});

// Perbaikan fungsi updateNavbarAuth
function updateNavbarAuth() {
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));

    if (isLoggedIn && currentUser) {
        navbarLoginBtn.textContent = 'Logout';
        navbarLoginBtn.onclick = () => {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            
            // Notifikasi logout
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-purple-500 text-white px-6 py-3 rounded-lg shadow-lg z-50';
            notification.innerHTML = `
                <div class="flex items-center space-x-2">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Berhasil logout. Sampai jumpa!</span>
                </div>
            `;
            document.body.appendChild(notification);

            setTimeout(() => {
                window.location.href = 'landing.html';
            }, 1500);
        };
    } else {
        navbarLoginBtn.textContent = 'Login / Register';
        navbarLoginBtn.onclick = () => {
            window.location.href = 'login.html';
        };
    }
}
    // Register link handler
    registerLink.addEventListener('click', (event) => {
        event.preventDefault();
        window.location.href = 'register.html';
    });
</script>
</body>
</html>
