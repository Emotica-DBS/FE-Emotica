<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Emotica</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="landing.html" class="navbar-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="8" width="40" height="28" rx="14" fill="#7F1DFF"/>
                    <ellipse cx="24" cy="22" rx="16" ry="12" fill="#fff"/>
                    <ellipse cx="18" cy="22" rx="2.5" ry="2.5" fill="#7F1DFF"/>
                    <ellipse cx="30" cy="22" rx="2.5" ry="2.5" fill="#7F1DFF"/>
                    <path d="M18 27c2.5 2 7.5 2 10 0" stroke="#7F1DFF" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Emotica
            </a>
            <div class="navbar-menu" id="navbarMenu">
                <a href="landing.html" class="navbar-link">Home</a>
                <a href="dashboard.html" class="navbar-link active">Dashboard</a>
                <a href="history.html" class="navbar-link">Riwayat</a>
                <a href="about.html" class="navbar-link">Tentang</a>
            </div>
            <div class="navbar-actions" id="navbarActions">
                <button class="navbar-btn" id="navbarLoginBtn">Login / Register</button>
            </div>
            <button class="navbar-hamburger" id="navbarHamburger"><i class="fas fa-bars"></i></button>
        </div>
    </nav>
    <div class="main-content">
        <div class="logo" style="display:none"></div>
        <svg class="dashboard-svg" viewBox="0 0 220 120" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="110" cy="110" rx="90" ry="10" fill="#7f1dff22"/>
            <rect x="30" y="20" width="160" height="60" rx="20" fill="#fff" fill-opacity="0.08" stroke="#a259ff" stroke-width="3"/>
            <ellipse cx="70" cy="50" rx="12" ry="12" fill="#a259ff"/>
            <ellipse cx="150" cy="50" rx="12" ry="12" fill="#a259ff"/>
            <ellipse cx="70" cy="50" rx="5" ry="5" fill="#fff"/>
            <ellipse cx="150" cy="50" rx="5" ry="5" fill="#fff"/>
            <path d="M90 70c8 8 32 8 40 0" stroke="#a259ff" stroke-width="4" stroke-linecap="round"/>
            <rect x="100" y="35" width="20" height="10" rx="5" fill="#fff" fill-opacity="0.15"/>
            <rect x="100" y="35" width="20" height="10" rx="5" stroke="#a259ff" stroke-width="2"/>
            <text x="110" y="43" text-anchor="middle" fill="#fff" font-size="10" font-family="Inter">
        </svg>
        <div class="neon-card w-full max-w-2xl p-10 flex flex-col items-center">
            <h2 class="text-3xl font-bold mb-6 gradient-text">Dashboard</h2>
            <section class="mb-8 w-full">
                <h3 class="text-xl font-semibold mb-4 gradient-text">Analisis Teks</h3>
                <textarea id="analysisText" placeholder="Masukkan teks yang ingin Anda analisis..." class="neon-textarea mb-4 h-32"></textarea>
                <div class="flex flex-col md:flex-row gap-4 w-full">
                    <button id="analyzeButton" class="neon-btn w-full md:w-auto">Analisis</button>
                    <button id="suggestionButton" class="neon-btn w-full md:w-auto">Berikan Saran</button>
                </div>
                <div id="analysisResult" class="mt-4 p-4 bg-white/10 rounded-xl text-white text-center"></div>
            </section>
            <a href="history.html" id="historyLink" class="text-purple-400 hover:underline mt-6 inline-block">Lihat Riwayat Analisis</a>
        </div>
    </div>

    <script>
        // Navbar hamburger logic
        const navbarHamburger = document.getElementById('navbarHamburger');
        const navbarMenu = document.getElementById('navbarMenu');
        navbarHamburger.addEventListener('click', () => {
            navbarMenu.classList.toggle('open');
        });
        // Navbar login/logout logic
        const navbarLoginBtn = document.getElementById('navbarLoginBtn');
        function updateNavbarAuth() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn) {
                navbarLoginBtn.textContent = 'Logout';
                navbarLoginBtn.onclick = () => {
                    localStorage.removeItem('isLoggedIn');
                    window.location.href = 'landing.html';
                };
            } else {
                navbarLoginBtn.textContent = 'Login / Register';
                navbarLoginBtn.onclick = () => {
                    window.location.href = 'login.html';
                };
            }
        }
        updateNavbarAuth();
    </script>
   <script>
        // Data untuk analisis sentimen dan saran
        const sentimentResponses = {
            positive: {
                emoji: "😊",
                responses: [
                    "Sangat Positif! Teks Anda memancarkan energi yang menyenangkan",
                    "Wow! Pesan yang sangat optimis dan membangun",
                    "Luar biasa positif! Teruskan semangat ini"
                ]
            },
            negative: {
                emoji: "😔",
                responses: [
                    "Sepertinya ada nuansa negatif dalam pesan ini",
                    "Teks ini terkesan kurang menyenangkan",
                    "Mungkin bisa menggunakan kata-kata yang lebih positif"
                ]
            },
            neutral: {
                emoji: "😐",
                responses: [
                    "Teks Anda terkesan netral",
                    "Pesan ini cukup seimbang",
                    "Tidak ada emosi yang terlalu dominan"
                ]
            }
        };

        const suggestionTemplates = [
            {
                context: "formal",
                suggestions: [
                    "Dengan hormat, saya ingin menyampaikan bahwa...",
                    "Mohon pertimbangan Bapak/Ibu terkait...",
                    "Terima kasih atas perhatian yang diberikan..."
                ]
            },
            {
                context: "informal",
                suggestions: [
                    "Hey, menurutku ini akan lebih baik kalau...",
                    "Bagaimana kalau kita coba...",
                    "Aku sangat menghargai pendapatmu tentang..."
                ]
            },
            {
                context: "professional",
                suggestions: [
                    "Berdasarkan analisis yang dilakukan...",
                    "Hasil evaluasi menunjukkan bahwa...",
                    "Sebagai tindak lanjut, disarankan untuk..."
                ]
            }
        ];

        // Script khusus dashboard
        const analysisText = document.getElementById('analysisText');
        const analyzeButton = document.getElementById('analyzeButton');
        const suggestionButton = document.getElementById('suggestionButton');
        const analysisResult = document.getElementById('analysisResult');
        const historyLink = document.getElementById('historyLink');

        // Check if user is logged in
        if (!localStorage.getItem('isLoggedIn')) {
            window.location.href = 'login.html';
        }

        analyzeButton.addEventListener('click', () => {
            const text = analysisText.value;
            if (!text.trim()) {
                analysisResult.innerHTML = '<span class="text-red-400">⚠️ Mohon masukkan teks terlebih dahulu</span>';
                return;
            }

            const sentiments = ['positive', 'negative', 'neutral'];
            const randomSentiment = sentiments[Math.floor(Math.random() * sentiments.length)];
            const sentiment = sentimentResponses[randomSentiment];
            const confidence = (Math.random() * 40 + 60).toFixed(1);

            const response = `
                <div class="text-center">
                    <div class="text-6xl mb-4">${sentiment.emoji}</div>
                    <div class="mb-2">${sentiment.responses[Math.floor(Math.random() * sentiment.responses.length)]}</div>
                    <div class="text-sm text-purple-400">Tingkat Kepercayaan: ${confidence}%</div>
                </div>
            `;

            analysisResult.innerHTML = response;
            storeSearch(text, `${randomSentiment} (${confidence}%)`);
        });

        suggestionButton.addEventListener('click', () => {
            const text = analysisText.value;
            if (!text.trim()) {
                analysisResult.innerHTML = '<span class="text-red-400">⚠️ Mohon masukkan teks terlebih dahulu</span>';
                return;
            }

            const contextType = suggestionTemplates[Math.floor(Math.random() * suggestionTemplates.length)];
            const suggestion = contextType.suggestions[Math.floor(Math.random() * contextType.suggestions.length)];

            const response = `
                <div class="text-center">
                    <div class="text-4xl mb-4">💡</div>
                    <div class="mb-2">Saran Alternatif Kalimat:</div>
                    <div class="text-purple-400 italic">"${suggestion}"</div>
                    <div class="text-sm mt-2 text-gray-400">(Konteks: ${contextType.context})</div>
                </div>
            `;

            analysisResult.innerHTML = response;
            storeSearch(text, `Saran: ${contextType.context}`);
        });

        historyLink.addEventListener('click', () => {
            window.location.href = 'history.html';
        });

        function storeSearch(text, resultType) {
            let history = JSON.parse(localStorage.getItem('searchHistory')) || [];
            history.push({ text, resultType, timestamp: new Date().toLocaleString() });
            localStorage.setItem('searchHistory', JSON.stringify(history));
        }
    </script>
</body>
</html>
